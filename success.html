<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Submitted — M-PESA with FAYDA</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css" />
  <style>
    .form-area {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Profile header */
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d0ead8 0%, #b6dfc2 100%);
      border: 3px solid #2FC56D;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-placeholder svg { width: 56px; height: 56px; stroke: #239150; }

    .profile-name {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a1a;
    }

    .profile-phone-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .profile-phone-label { font-size: 13px; font-weight: 600; color: #888; }
    .profile-phone-val   { font-size: 13px; font-weight: 700; color: #333; }

    /* Success card */
    .success-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 20px;
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      width: 100%;
    }

    .success-title {
      font-size: 18px;
      font-weight: 800;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Animated check circle */
    .check-circle {
      width: 80px;
      height: 80px;
      position: relative;
    }

    .check-circle svg {
      width: 80px;
      height: 80px;
    }

    .circle-track {
      fill: none;
      stroke: #e8f5ee;
      stroke-width: 4;
    }

    .circle-fill {
      fill: none;
      stroke: #2FC56D;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      transform-origin: center;
      transform: rotate(-90deg);
      animation: drawCircle 0.7s ease forwards 0.2s;
    }

    .check-mark {
      stroke: #2FC56D;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.4s ease forwards 0.85s;
    }

    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .success-message {
      font-size: 15px;
      font-weight: 500;
      color: #2FC56D;
      line-height: 1.65;
      text-align: center;
      max-width: 300px;
    }

    /* Done button */
    .done-btn {
      width: 100%;
      margin-top: 8px;
      padding: 20px 28px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #2FC56D 0%, #239150 100%);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 24px rgba(35,145,80,0.30);
      transition: box-shadow 0.25s, transform 0.2s;
    }
    .done-btn:hover {
      box-shadow: 0 12px 32px rgba(35,145,80,0.40);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <!-- LEFT GREEN PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <h1 class="left-title">Verify Your M-PESA<br>Account with FAYDA</h1>

      <div class="logo-strip">
        <div class="logo-bubble"><img src="fayda-logo-hq.png" alt="FAYDA" /></div>
        <div class="connector">
          <div class="c-dot"></div>
          <div class="c-dash"></div>
          <div class="arrow-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#239150" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
          </div>
          <div class="c-dash"></div>
          <div class="c-dot"></div>
        </div>
        <div class="logo-bubble"><img src="M-Pesa-Logo.png" alt="M-PESA" /></div>
      </div>

      <div class="left-tagline">
        <p>የፋይዳ መለያ ቁጥርን እኩዎንትዮ ጋር ያስተሳስሩ</p>
        <p>Link your FAYDA ID with your account</p>
      </div>
    </div>
  </div>

  <!-- RIGHT WHITE PANEL -->
  <div class="right-panel">
    <div class="top-bar">
      <div class="lang-switcher">
        <button class="lang-btn" id="langBtn" onclick="toggleLang(event)">
          <span id="langBtnText">EN</span>
          <svg viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z"/></svg>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option active" data-lang="en" onclick="selectLang('en')">
            <span>English</span><span class="check">✓</span>
          </button>
          <button class="lang-option" data-lang="am" onclick="selectLang('am')">
            <span>አማርኛ</span><span class="check">✓</span>
          </button>
        </div>
      </div>
    </div>

    <div class="form-area">

      <!-- Step indicators: all done -->
      <div class="steps" style="align-self:flex-start;">
        <div class="step done">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2,8 6,12 14,4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="step-line done"></div>
        <div class="step done">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2,8 6,12 14,4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="step-line done"></div>
        <div class="step done">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2,8 6,12 14,4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="step-line done"></div>
        <div class="step done">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2,8 6,12 14,4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="step-line done"></div>
        <div class="step done">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2,8 6,12 14,4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Profile header -->
      <div class="profile-header">
        <div class="avatar-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="profile-name">Zemedkun Kidane</div>
        <div class="profile-phone-row">
          <span class="profile-phone-label">Phone Number</span>
          <span class="profile-phone-val">079 123 1222</span>
        </div>
      </div>

      <!-- Success card -->
      <div class="success-card">
        <p class="success-title">Request Submitted!</p>

        <!-- Animated check circle -->
        <div class="check-circle">
          <svg viewBox="0 0 80 80">
            <circle class="circle-track" cx="40" cy="40" r="34"/>
            <circle class="circle-fill"  cx="40" cy="40" r="34"/>
            <polyline class="check-mark" points="24,40 34,52 56,28"/>
          </svg>
        </div>

        <p class="success-message">
          Your Request to link your account with Fayda is successfully submitted.
          You will receive confirmation SMS shortly.
        </p>
      </div>

      <!-- Done button -->
      <button class="done-btn" onclick="window.location.href='index.html'">
        Done
      </button>

    </div>
  </div>

  <script>
    function toggleLang(e) {
      e.stopPropagation();
      document.getElementById('langBtn').classList.toggle('open');
      document.getElementById('langDropdown').classList.toggle('open');
    }
    function selectLang(lang) {
      document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
      document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
      document.getElementById('langBtnText').textContent = lang === 'en' ? 'EN' : 'AM';
      document.getElementById('langBtn').classList.remove('open');
      document.getElementById('langDropdown').classList.remove('open');
    }
    document.addEventListener('click', () => {
      document.getElementById('langBtn').classList.remove('open');
      document.getElementById('langDropdown').classList.remove('open');
    });
  </script>

</body>
</html>
